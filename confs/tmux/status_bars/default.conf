set-option -g status-position top
set-option -g status-interval 1

set -g status-style 'bg=default,fg=default'
set -g status-left "" 

set -g status-right-length 20
set -g status-right "#[fg=#1d2021,bg=#d79921,bold] #I #[fg=#d79921,bg=#1d2021 ,bold] #W "

set -g window-status-format ""
set -g window-status-current-format ""

set -g message-style bg=default,fg=#d79921,bold
set -g message-command-style bg=default,fg=#d79921,bold

set -g pane-active-border-style fg=#282828
set -g pane-border-style fg=#282828

# vim:set ft=tmux:pl

